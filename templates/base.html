<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WatermarkForge{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'stripe': 'stripe 1s linear infinite',
                    },
                    keyframes: {
                        stripe: {
                            '0%': { backgroundPosition: '1rem 0' },
                            '100%': { backgroundPosition: '0 0' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        /* 进度条动画条纹 */
        .progress-stripe {
            background-image: linear-gradient(
                45deg,
                rgba(255,255,255,0.1) 25%, transparent 25%,
                transparent 50%, rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0.1) 75%, transparent 75%,
                transparent
            );
            background-size: 1rem 1rem;
            animation: stripe 1s linear infinite;
        }
        @keyframes stripe {
            0% { background-position: 1rem 0; }
            100% { background-position: 0 0; }
        }
        /* 拖拽高亮 */
        .drag-highlight {
            border-color: #3b82f6 !important;
            background-color: rgba(59, 130, 246, 0.08) !important;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">
    {% include "components/nav.html" %}

    <main class="container mx-auto px-4 py-8 max-w-5xl flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-800 py-4 text-center text-sm text-slate-500">
        WatermarkForge &copy; {{ now.year if now else '2026' }} &mdash; 企业文档盲水印自动化系统
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
