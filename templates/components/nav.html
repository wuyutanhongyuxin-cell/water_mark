<!-- 顶部导航栏 — 粘性定位 + 毛玻璃背景 -->
<nav class="sticky top-0 z-50 backdrop-blur-md bg-slate-900/80 border-b border-slate-800"
     x-data="{ mobileOpen: false }">
    <div class="container mx-auto max-w-5xl px-4">
        <div class="flex items-center justify-between h-14">
            <!-- Logo / 标题 -->
            <a href="/" class="flex items-center gap-2 text-lg font-bold text-blue-400 hover:text-blue-300 transition-colors">
                <!-- 水印图标 SVG -->
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                </svg>
                WatermarkForge
            </a>

            <!-- 桌面端导航链接 -->
            <div class="hidden md:flex items-center gap-1">
                {% set nav_items = [
                    ('embed', '嵌入水印', '/embed'),
                    ('extract', '提取水印', '/extract'),
                    ('verify', '验证水印', '/verify'),
                    ('history', '操作历史', '/history'),
                ] %}
                {% for key, label, href in nav_items %}
                <a href="{{ href }}"
                   class="px-3 py-2 rounded-lg text-sm font-medium transition-colors
                          {% if active_page == key %}
                            bg-blue-600/20 text-blue-400
                          {% else %}
                            text-slate-300 hover:text-white hover:bg-slate-800
                          {% endif %}">
                    {{ label }}
                </a>
                {% endfor %}
            </div>

            <!-- 移动端菜单按钮 -->
            <button @click="mobileOpen = !mobileOpen"
                    class="md:hidden p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
                    :aria-expanded="mobileOpen">
                <!-- 汉堡图标 / 关闭图标切换 -->
                <svg x-show="!mobileOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
                </svg>
                <svg x-show="mobileOpen" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- 移动端下拉菜单 -->
        <div x-show="mobileOpen" x-cloak
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-2"
             class="md:hidden pb-3 space-y-1">
            {% for key, label, href in nav_items %}
            <a href="{{ href }}"
               class="block px-3 py-2 rounded-lg text-sm font-medium transition-colors
                      {% if active_page == key %}
                        bg-blue-600/20 text-blue-400
                      {% else %}
                        text-slate-300 hover:text-white hover:bg-slate-800
                      {% endif %}">
                {{ label }}
            </a>
            {% endfor %}
        </div>
    </div>
</nav>
