{% extends "base.html" %}
{% set active_page = 'history' %}

{% block title %}操作历史 - WatermarkForge{% endblock %}

{% block content %}
<div x-data="historyApp()" x-init="loadHistory()">

    <!-- 页面标题 -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-white">操作历史</h1>
        <p class="text-slate-400 mt-1 text-sm">查看所有水印嵌入、提取、验证的操作记录</p>
    </div>

    <!-- ========== 第1区: 筛选栏 ========== -->
    <section class="mb-6 flex flex-col sm:flex-row items-start sm:items-center gap-3">
        <!-- 操作类型筛选 -->
        <div class="flex items-center gap-2">
            <label class="text-sm text-slate-400">操作类型:</label>
            <select x-model="filter"
                    @change="page = 1; loadHistory()"
                    class="px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-sm text-slate-200
                           focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                <option value="">全部</option>
                <option value="embed">嵌入</option>
                <option value="extract">提取</option>
                <option value="verify">验证</option>
            </select>
        </div>

        <div class="flex-1"></div>

        <!-- 刷新按钮 -->
        <button @click="loadHistory()"
                :disabled="loading"
                class="inline-flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg
                       text-sm text-slate-300 hover:text-white hover:border-slate-500 transition-colors
                       disabled:opacity-50">
            <svg class="w-4 h-4" :class="{ 'animate-spin': loading }"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
            </svg>
            刷新
        </button>
    </section>

    <!-- ========== 第2区: 历史记录表格 ========== -->
    <section class="mb-6">
        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
            <!-- 加载状态 -->
            <template x-if="loading && items.length === 0">
                <div class="p-12 text-center">
                    <svg class="animate-spin w-8 h-8 text-blue-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <p class="text-sm text-slate-400">加载中...</p>
                </div>
            </template>

            <!-- 空状态 -->
            <template x-if="!loading && items.length === 0">
                <div class="p-12 text-center">
                    <svg class="w-12 h-12 text-slate-600 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0l-3-3m3 3l3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
                    </svg>
                    <p class="text-sm text-slate-400">暂无操作记录</p>
                </div>
            </template>

            <!-- 表格 -->
            <template x-if="items.length > 0">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-slate-700">
                                <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">时间</th>
                                <th class="text-center px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">操作</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">文件名</th>
                                <th class="text-center px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">状态</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">员工 ID</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">详情</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-700/50">
                            <template x-for="(item, i) in items" :key="item.task_id || i">
                                <tr class="hover:bg-slate-700/30 transition-colors">
                                    <!-- 时间 -->
                                    <td class="px-4 py-3 text-xs text-slate-400 whitespace-nowrap"
                                        x-text="formatTime(item.created_at)">
                                    </td>
                                    <!-- 操作类型 -->
                                    <td class="px-4 py-3 text-center">
                                        <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium"
                                              :class="{
                                                  'bg-blue-500/20 text-blue-400': item.operation === 'embed',
                                                  'bg-green-500/20 text-green-400': item.operation === 'extract',
                                                  'bg-yellow-500/20 text-yellow-400': item.operation === 'verify'
                                              }"
                                              x-text="{
                                                  'embed': '嵌入',
                                                  'extract': '提取',
                                                  'verify': '验证'
                                              }[item.operation] || item.operation">
                                        </span>
                                    </td>
                                    <!-- 文件名 -->
                                    <td class="px-4 py-3">
                                        <span class="text-slate-200 truncate block max-w-[180px]"
                                              x-text="item.filename || '-'"
                                              :title="item.filename">
                                        </span>
                                    </td>
                                    <!-- 状态 -->
                                    <td class="px-4 py-3 text-center">
                                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs"
                                              :class="{
                                                  'bg-green-500/20 text-green-400': item.status === 'completed',
                                                  'bg-red-500/20 text-red-400': item.status === 'failed',
                                                  'bg-blue-500/20 text-blue-400': item.status === 'processing',
                                                  'bg-slate-500/20 text-slate-400': item.status === 'pending'
                                              }"
                                              x-text="{
                                                  'completed': '完成',
                                                  'failed': '失败',
                                                  'processing': '处理中',
                                                  'pending': '排队中'
                                              }[item.status] || item.status">
                                        </span>
                                    </td>
                                    <!-- 员工 ID -->
                                    <td class="px-4 py-3">
                                        <span class="text-slate-300 font-mono text-xs"
                                              x-text="item.employee_id || '-'"></span>
                                    </td>
                                    <!-- 详情 -->
                                    <td class="px-4 py-3">
                                        <span class="text-xs text-slate-400 truncate block max-w-[150px]"
                                              x-text="item.message || '-'"
                                              :title="item.message"></span>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </div>
    </section>

    <!-- ========== 第3区: 分页 ========== -->
    <section x-show="totalPages > 1" class="flex items-center justify-between">
        <p class="text-sm text-slate-500">
            第 <span x-text="page"></span> / <span x-text="totalPages"></span> 页，
            共 <span x-text="total"></span> 条记录
        </p>
        <div class="flex items-center gap-2">
            <button @click="prevPage()"
                    :disabled="page <= 1"
                    class="px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-sm text-slate-300
                           hover:text-white hover:border-slate-500 transition-colors
                           disabled:opacity-50 disabled:cursor-not-allowed">
                上一页
            </button>
            <button @click="nextPage()"
                    :disabled="page >= totalPages"
                    class="px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-sm text-slate-300
                           hover:text-white hover:border-slate-500 transition-colors
                           disabled:opacity-50 disabled:cursor-not-allowed">
                下一页
            </button>
        </div>
    </section>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/history.js"></script>
{% endblock %}
